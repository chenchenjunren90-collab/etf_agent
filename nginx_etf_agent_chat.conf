# Nginx snippet for ETF agent chat frontend
# Include inside the same server {} that already has /etf-agent/ for the dashboard.
#
# Dashboard (existing):  http://HOST/etf-agent/
# Chat (new):            http://HOST/etf-agent/chat/

location = /etf-agent/chat {
    return 302 /etf-agent/chat/;
}

location ^~ /etf-agent/chat/ {
    proxy_pass http://127.0.0.1:8766/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 360s;
    proxy_send_timeout 360s;
}
