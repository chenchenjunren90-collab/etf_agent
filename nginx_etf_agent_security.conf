# Rate limits for ETF agent public endpoints (included in server {} block).
# Requires limit_req_zone lines in http {} — see _deploy_security.py.

location = /etf-agent/api/run {
    limit_req zone=etf_run burst=1 nodelay;
    proxy_pass http://127.0.0.1:8765/api/run;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_buffering off;
    proxy_cache off;
}

location ^~ /etf-agent/chat/api/ {
    limit_req zone=etf_chat burst=5 nodelay;
    proxy_pass http://127.0.0.1:8766/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 360s;
    proxy_send_timeout 360s;
}
